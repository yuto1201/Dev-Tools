<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignPocket — Theme Catalog</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/theme.css">
<link rel="stylesheet" href="../lib/components.css">
<script src="../lib/theme.js"></script>
<script src="../lib/icons.js"></script>


<link rel="stylesheet" href="style.css">
</head>
<body data-view="list">

<!-- ============================================================ -->
<!-- LIST VIEW — テーマ一覧                                         -->
<!-- ============================================================ -->
<section class="app-view app-view-list">
  <div class="app-inner">
    <header class="app-header">
      <div class="app-header-left">
        <a href="../index.html" class="app-back-btn" title="Back to Toolbox">← 戻る</a>
        <span class="app-title-icon" id="app-icon"></span>
        <h1 class="app-title">DesignPocket</h1>
      </div>
      <div class="app-header-right">
        <div id="theme-mount"></div>
      </div>
    </header>

    <div class="app-toolbar">
      <h2 class="app-section-title">テーマ一覧</h2>
    </div>

    <div class="dp-theme-grid" id="theme-grid"></div>

    <div class="app-empty" id="theme-empty" style="display:none;">
      <div class="app-empty-icon">✦</div>
      <div class="app-empty-text">テーマがありません</div>
    </div>
  </div>
</section>

<!-- ============================================================ -->
<!-- EDITOR VIEW — テーマ編集                                       -->
<!-- ============================================================ -->
<section class="app-view app-view-editor">
  <div class="app-inner">
    <header class="app-header">
      <div class="app-header-left">
        <a href="#" class="app-back-btn" id="back-to-list" title="一覧に戻る">← 一覧</a>
        <h1 class="app-title app-title-editable" id="editor-title" title="クリックで名前を変更">テーマ名</h1>
      </div>
      <div class="app-header-right">
        <div id="theme-mount-editor"></div>
      </div>
    </header>

    <div class="app-editor-body dp-editor-body">

      <!-- ===== LEFT PANE: form ===== -->
      <aside class="dp-form-pane">

        <!-- Meta -->
        <section class="dp-form-section">
          <h3 class="dp-form-section-title">// meta</h3>
          <div class="form-row">
            <label class="form-label" for="field-name">名前</label>
            <input class="form-input" id="field-name" type="text" maxlength="80" placeholder="例: Glassmorphism">
          </div>
          <div class="form-row">
            <label class="form-label" for="field-description">説明</label>
            <textarea class="form-input" id="field-description" rows="2" maxlength="300" placeholder="このテーマの特徴・用途メモ"></textarea>
          </div>
        </section>

        <!-- Colors -->
        <section class="dp-form-section">
          <h3 class="dp-form-section-title">// colors</h3>
          <div class="dp-token-grid" id="form-colors"></div>
        </section>

        <!-- Radius -->
        <section class="dp-form-section">
          <h3 class="dp-form-section-title">// radius</h3>
          <div class="dp-token-grid dp-token-grid-2" id="form-radius"></div>
        </section>

        <!-- Spacing -->
        <section class="dp-form-section">
          <h3 class="dp-form-section-title">// spacing</h3>
          <div class="dp-token-grid dp-token-grid-2" id="form-spacing"></div>
        </section>

        <!-- Fonts -->
        <section class="dp-form-section">
          <h3 class="dp-form-section-title">// fonts</h3>
          <div class="dp-token-grid dp-token-grid-1" id="form-fonts"></div>
        </section>

        <!-- Custom CSS -->
        <section class="dp-form-section">
          <h3 class="dp-form-section-title">// custom css</h3>
          <p class="dp-form-hint">shadow の重ね合わせ、<code>.btn</code> 等コンポーネント上書き、<code>backdrop-filter</code> など自由 CSS。ここに書いた内容は <code>:root</code> の後に挿入される。</p>
          <textarea class="form-input dp-custom-css" id="field-custom-css" rows="14" spellcheck="false" placeholder="/* 例: 二重シャドウ */
:root {
  --shadow-out: -8px -8px 16px #fff, 8px 8px 16px rgba(163,177,198,.5);
}
.btn {
  backdrop-filter: blur(10px);
}"></textarea>
        </section>

      </aside>

      <!-- ===== RIGHT PANE: live preview ===== -->
      <div class="dp-preview-pane">
        <div class="dp-preview-head">
          <span class="dp-preview-label">// live preview</span>
          <span class="dp-preview-hint" id="preview-status">ready</span>
        </div>
        <div class="dp-preview-frame-wrap">
          <iframe id="preview-frame" src="preview.html" title="Theme preview"></iframe>
        </div>
      </div>

    </div>
  </div>
</section>


<!-- ============================================================ -->
<!-- MODAL: CSS エクスポート                                        -->
<!-- ============================================================ -->
<div class="modal-overlay" id="modal-export" hidden>
  <div class="modal dp-modal-wide" role="dialog" aria-modal="true" aria-labelledby="modal-export-title">
    <header class="modal-header">
      <h3 class="modal-title" id="modal-export-title">CSS エクスポート</h3>
      <button type="button" class="modal-close" data-close="modal-export" aria-label="閉じる">×</button>
    </header>
    <div class="modal-body">
      <p class="dp-form-hint">下の CSS を <code>lib/theme.css</code> にコピーすれば、このテーマがプロジェクト全体に適用されます。</p>
      <textarea class="form-input dp-export-textarea" id="export-textarea" rows="18" readonly></textarea>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-close="modal-export">閉じる</button>
        <button type="button" class="btn btn-primary" id="btn-copy-export">コピー</button>
      </div>
    </div>
  </div>
</div>


<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>

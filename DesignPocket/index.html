<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesignPocket — yuto's dev tools</title>

<!-- ===== 共通テーマ ===== -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/theme.css">
<link rel="stylesheet" href="../lib/components.css">
<script src="../lib/theme.js"></script>

<!-- ===== Drive sync ===== -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="../lib/drive-sync.css">

<!-- ===== ツール固有 ===== -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-inner">

  <!-- ===== Standard header ===== -->
  <header class="app-header">
    <div class="app-header-left">
      <a href="../index.html" class="app-back-btn" title="Back to Toolbox">← 戻る</a>
      <span class="app-title-icon">🎨</span>
      <h1 class="app-title">DesignPocket</h1>
    </div>
    <div class="app-header-right">
      <div id="theme-mount"></div>
      <div id="sync-mount"></div>
    </div>
  </header>

  <!-- ===== Navigation tabs + action ===== -->
  <div class="app-toolbar">
    <nav class="tab-bar" aria-label="メインナビゲーション" role="tablist">
      <button type="button" class="tab" data-view="gallery" role="tab" aria-controls="view-gallery" aria-selected="false">ギャラリー</button>
      <button type="button" class="tab" data-view="apps" role="tab" aria-controls="view-apps" aria-selected="false">アプリ別</button>
    </nav>
    <button type="button" class="btn btn-primary" id="openAddBtn" aria-label="新しいアイデアを追加">＋ 追加</button>
  </div>

  <main class="dp-main">

    <!-- ===== Gallery view ===== -->
    <section class="view view-gallery" id="view-gallery" aria-label="ギャラリー">
      <div class="dp-filter-bar">
        <div class="dp-filter-group">
          <label class="form-label" for="filter-app">アプリ</label>
          <select id="filter-app" class="select">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="dp-filter-group">
          <label class="form-label" for="filter-tag">タグ</label>
          <select id="filter-tag" class="select">
            <option value="">すべて</option>
          </select>
        </div>
        <button type="button" class="btn btn-ghost" id="clear-filters">クリア</button>
        <span class="badge badge-primary dp-count-badge" id="gallery-count">0 件</span>
      </div>

      <div class="dp-masonry" id="gallery-grid"></div>
      <div class="app-empty" id="gallery-empty" hidden>
        <div class="app-empty-icon">✦</div>
        <div class="app-empty-text">まだアイデアがありません</div>
        <div class="app-empty-sub">右上の「＋ 追加」から最初のインスピレーションを登録しよう</div>
      </div>
    </section>

    <!-- ===== Apps view ===== -->
    <section class="view view-apps" id="view-apps" aria-label="アプリ別" hidden>
      <div class="dp-apps-toolbar">
        <h2 class="app-section-title"></h2>
        <button type="button" class="btn btn-primary" id="openAddAppBtn">＋ 新しいアプリ</button>
      </div>
      <div class="dp-apps-grid" id="apps-grid"></div>
      <div class="app-empty" id="apps-empty" hidden>
        <div class="app-empty-icon">◬</div>
        <div class="app-empty-text">アプリ未登録</div>
        <div class="app-empty-sub">アプリを作成すると、アイデアをプロジェクト単位で整理できます</div>
      </div>
    </section>

  </main>
</div>

<!-- ===== Add Idea Modal ===== -->
<div class="modal-overlay" id="addIdeaOverlay" role="dialog" aria-modal="true" aria-labelledby="addIdeaTitle" hidden>
  <div class="modal dp-modal-wide">
    <div class="modal-header">
      <h3 class="modal-title" id="addIdeaTitle">アイデアを追加</h3>
      <button type="button" class="modal-close" data-close-modal="addIdeaOverlay" aria-label="閉じる">×</button>
    </div>
    <form class="modal-body" id="addIdeaForm" autocomplete="off">
      <div class="form-row">
        <label class="form-label" for="idea-title">タイトル <span class="required">*</span></label>
        <input class="form-input" id="idea-title" name="title" type="text" required maxlength="120" placeholder="例：ログイン画面のグラデーション">
      </div>

      <div class="form-row">
        <label class="form-label" for="idea-image">画像</label>
        <div class="dp-upload-zone" id="upload-zone">
          <input class="dp-upload-input" id="idea-image" name="image" type="file" accept="image/*">
          <div class="dp-upload-hint" id="upload-hint">クリックして画像を選択 / ドラッグ＆ドロップ</div>
          <img class="dp-upload-preview" id="upload-preview" alt="プレビュー" hidden>
          <button type="button" class="dp-upload-clear" id="upload-clear" hidden>画像を削除</button>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label" for="idea-url">参考URL</label>
        <input class="form-input" id="idea-url" name="url" type="url" placeholder="https://...">
      </div>

      <div class="form-row dp-form-2col">
        <div>
          <label class="form-label" for="idea-app">紐づけるアプリ</label>
          <select class="select" id="idea-app" name="appId">
            <option value="">（未設定）</option>
          </select>
        </div>
        <div>
          <label class="form-label" for="idea-screen">画面名</label>
          <input class="form-input" id="idea-screen" name="screen" type="text" maxlength="80" placeholder="例：オンボーディング">
        </div>
      </div>

      <div class="form-row">
        <label class="form-label" for="idea-tags">タグ <span class="dp-hint">(カンマ区切り)</span></label>
        <input class="form-input" id="idea-tags" name="tags" type="text" placeholder="例：dark, gradient, glass">
      </div>

      <div class="form-row">
        <label class="form-label" for="idea-note">実装メモ</label>
        <textarea class="form-input" id="idea-note" name="note" rows="3" maxlength="1000" placeholder="ポイント・参考にしたい部分など"></textarea>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-close-modal="addIdeaOverlay">キャンセル</button>
        <button type="submit" class="btn btn-primary">保存する</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== Add App Modal ===== -->
<div class="modal-overlay" id="addAppOverlay" role="dialog" aria-modal="true" aria-labelledby="addAppTitle" hidden>
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="addAppTitle">アプリを追加</h3>
      <button type="button" class="modal-close" data-close-modal="addAppOverlay" aria-label="閉じる">×</button>
    </div>
    <form class="modal-body" id="addAppForm" autocomplete="off">
      <div class="form-row">
        <label class="form-label" for="app-name">アプリ名 <span class="required">*</span></label>
        <input class="form-input" id="app-name" name="name" type="text" required maxlength="60" placeholder="例：MyAwesomeApp">
      </div>
      <div class="form-row">
        <label class="form-label" for="app-emoji">絵文字アイコン</label>
        <input class="form-input" id="app-emoji" name="emoji" type="text" maxlength="4" placeholder="🚀">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-close-modal="addAppOverlay">キャンセル</button>
        <button type="submit" class="btn btn-primary">追加する</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== Idea Detail Modal ===== -->
<div class="modal-overlay" id="detailOverlay" role="dialog" aria-modal="true" aria-labelledby="detailTitle" hidden>
  <div class="modal dp-modal-lg">
    <div class="modal-header">
      <h3 class="modal-title" id="detailTitle">アイデア詳細</h3>
      <button type="button" class="modal-close" data-close-modal="detailOverlay" aria-label="閉じる">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="../lib/drive-sync.js"></script>
<script src="app.js"></script>
</body>
</html>

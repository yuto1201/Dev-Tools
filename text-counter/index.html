<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Counter — yuto's dev tools</title>

<!-- ===== 共通テーマ ===== -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../lib/theme.css">
<link rel="stylesheet" href="../lib/components.css">
<script src="../lib/theme.js"></script>

<!-- ===== Drive sync ===== -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="../lib/drive-sync.css">

<!-- ===== ツール固有 ===== -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-inner">
  <header class="app-header">
    <div class="app-header-left">
      <a href="../index.html" class="app-back-btn" title="Back to Toolbox">← 戻る</a>
      <span class="app-title-icon">📝</span>
      <h1 class="app-title">Text Counter</h1>
    </div>
    <div class="app-header-right">
      <div id="theme-mount"></div>
      <div id="sync-mount"></div>
    </div>
  </header>

  <main class="app-main">
    <textarea class="form-input tc-textarea" id="input" placeholder="ここにテキストを入力してください"></textarea>

    <div class="tc-stats">
      <div class="tc-stat">
        <div class="tc-stat-label">文字数（空白込み）</div>
        <div class="tc-stat-value" id="countChars">0</div>
      </div>
      <div class="tc-stat">
        <div class="tc-stat-label">文字数（空白なし）</div>
        <div class="tc-stat-value" id="countNoSpaces">0</div>
      </div>
      <div class="tc-stat">
        <div class="tc-stat-label">単語数</div>
        <div class="tc-stat-value" id="countWords">0</div>
      </div>
      <div class="tc-stat">
        <div class="tc-stat-label">行数</div>
        <div class="tc-stat-value" id="countLines">0</div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="../lib/drive-sync.js"></script>
<script src="script.js"></script>
</body>
</html>
